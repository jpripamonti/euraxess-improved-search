topic_domains:
  # ── Computer Science & Data Science ─────────────────────────────────────────
  # Split out from engineering_technology because CS/AI/data-science research
  # postings are semantically very different from classical engineering postings,
  # and the combined prototype caused both to score poorly.
  computer_science:
    label: Computer Science & AI
    description: >
      Computer science, software engineering, artificial intelligence, machine
      learning, deep learning, data science, algorithms, cybersecurity, natural
      language processing, computer vision, and computational research.
    seed_terms:
      - computer science
      - software engineering
      - programming
      - algorithms
      - data structures
      - artificial intelligence
      - machine learning
      - deep learning
      - neural networks
      - large language models
      - natural language processing
      - computer vision
      - reinforcement learning
      - generative AI
      - data science
      - big data
      - data mining
      - data engineering
      - databases
      - information retrieval
      - cybersecurity
      - network security
      - distributed systems
      - cloud computing
      - high-performance computing
      - scientific computing
      - human-computer interaction
      - user interface design
      - graph theory
      - formal methods
      - programming languages
      - compiler design
      - operating systems
      - digital twin
      - Internet of Things

